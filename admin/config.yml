yamlbackend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Products"
    folder: "_products"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "product"}
      - {label: "Product Name", name: "title", widget: "string"}
      - {label: "SEO Description", name: "description", widget: "text", required: false}
      - {label: "Tagline", name: "tagline", widget: "string", required: false}
      - {label: "Price (€)", name: "price", widget: "string", required: false}
      - {label: "Price Note", name: "price_note", widget: "string", required: false}
      - {label: "Availability", name: "availability", widget: "select", options: ["In Stock", "Order Only", "Out of Stock"], required: false}
      - {label: "Sort Order", name: "order", widget: "number", default: 9, required: false}
      - {label: "URL Path", name: "permalink", widget: "string", hint: "e.g. /products/my-product/", required: false}
      - {label: "Main Image", name: "main_image", widget: "image", required: false}
      - label: "Gallery Images"
        name: "gallery"
        widget: "list"
        required: false
        field: {label: "Image", name: ".", widget: "image", required: false}
      - label: "Quick Specs (shown on top)"
        name: "quick_specs"
        widget: "list"
        required: false
        fields:
          - {label: "Value", name: "value", widget: "string", required: false}
          - {label: "Unit", name: "unit", widget: "string", required: false}
          - {label: "Label", name: "label", widget: "string", required: false}
      - label: "Full Specifications"
        name: "specs"
        widget: "list"
        required: false
        fields:
          - {label: "Spec Name", name: "key_en", widget: "string", required: false}
          - {label: "Value", name: "value", widget: "string", required: false}
      - {label: "Description Text", name: "description_en", widget: "text", required: false}

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "_data/settings.yml"
        fields:
          - {label: "Phone", name: "phone", widget: "string", required: false}
          - {label: "WhatsApp Number", name: "whatsapp", widget: "string", required: false}
          - {label: "Facebook URL", name: "facebook", widget: "string", required: false}
          - {label: "TikTok URL", name: "tiktok", widget: "string", required: false}
          - {label: "Address", name: "address", widget
